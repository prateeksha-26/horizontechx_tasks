version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: connectspace-db
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: connectspace

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: connectspace-app
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/connectspace
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-use-long-random-string}
      JWT_EXPIRES_IN: 7d
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-this-32-char-key-prod!!}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5000}
      NODE_ENV: production
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mongodb

volumes:
  mongo_data:
  uploads_data:
