<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verdant & Co — Shop</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="nav-root"></div>

<header class="hero">
  <div class="container">
    <h1>Everyday goods,<br><span class="accent">made to last.</span></h1>
    <p>Thoughtfully chosen electronics, home, and fitness essentials — browse the collection below.</p>
  </div>
</header>

<main class="container">
  <div class="filters">
    <input type="text" id="search-input" placeholder="Search products…">
    <select id="category-select">
      <option value="">All categories</option>
    </select>
  </div>

  <div id="product-grid" class="product-grid">
    <p>Loading products…</p>
  </div>
</main>

<footer class="site-footer">Verdant &amp; Co — demo storefront built with Express.js</footer>

<script src="/js/nav.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
